name: Release

on:
  push:
    branches:
      - chore/release-ssh-debug
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Version string used for validation builds
        required: false
        default: '0.0.0'
        type: string

permissions: {}

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  release:
