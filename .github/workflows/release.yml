name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Build & Release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Archive
        run: |
          xcodebuild archive \
            -project Keypunch.xcodeproj \
            -scheme Keypunch \
            -archivePath build/Keypunch.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            MARKETING_VERSION="$VERSION"

      - name: Create ZIP
        run: |
          cd build/Keypunch.xcarchive/Products/Applications
          zip -r "$GITHUB_WORKSPACE/Keypunch.zip" Keypunch.app

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            Keypunch.zip \
            --title "Keypunch $GITHUB_REF_NAME" \
            --generate-notes
