name: Test
on:
  workflow_call:
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      test: ${{ steps.default.outputs.test || steps.filter.outputs.test || 'false' }}
    steps:
      - name: Enable tests for reusable workflow calls
        id: default
        if: github.event_name == 'workflow_call'
        run: echo "test=true" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: github.event_name == 'push'
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect files changed from main
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          base: main
          filters: |
            test:
              - 'Keypunch/**'
              - 'Keypunch.xcodeproj/**'
              - 'KeypunchTests/**'
              - 'KeypunchUITests/**'
              - 'Dependencies/**'
              - 'mise.toml'
              - 'lefthook.yml'
    timeout-minutes: 60
  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.test == 'true'
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.3.9
          cache: true
      - name: SwiftFormat check
        run: mise exec -- swiftformat --lint .
      - name: SwiftLint check
        run: mise exec -- swiftlint lint --quiet
    timeout-minutes: 60
  unit-test:
    name: Unit Tests (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.test == 'true'
    runs-on: ${{ matrix.os }}
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run unit tests
        run: |
          xcodebuild -version
          xcodebuild -project Keypunch.xcodeproj \
            -scheme Keypunch \
            -destination 'platform=macOS' \
            -only-testing:KeypunchTests \
            test
    timeout-minutes: 60
  ui-test:
    name: UI Tests (${{ matrix.os }}, ${{ matrix.shard.name }})
    needs: changes
    if: needs.changes.outputs.test == 'true'
    runs-on: ${{ matrix.os }}
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26]
        shard:
          - name: Basics
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIBasicsTests
          - name: Edit Flow
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIEditFlowTests
          - name: Shortcut Management
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIShortcutManagementTests
          - name: Keyboard Navigation
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIKeyboardNavigationTests
          - name: Keyboard Edit Card
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIKeyboardEditCardTests
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run UI tests
        run: |
          xcodebuild -version
          xcodebuild -project Keypunch.xcodeproj \
            -scheme Keypunch \
            -destination 'platform=macOS' \
            ${{ matrix.shard.only_testing }} \
            test
    timeout-minutes: 60
