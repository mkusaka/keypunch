name: Test

on:
  workflow_call:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      test: ${{ steps.default.outputs.test || steps.filter.outputs.test || 'false' }}
    steps:
      - name: Enable tests for reusable workflow calls
        id: default
        if: github.event_name == 'workflow_call'
        run: echo "test=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: github.event_name == 'push'
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect files changed from main
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          base: main
          filters: |
            test:
              - 'Keypunch/**'
              - 'Keypunch.xcodeproj/**'
              - 'KeypunchTests/**'
              - 'KeypunchUITests/**'
              - 'Dependencies/**'
              - 'mise.toml'
              - '.github/workflows/test.yml'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.test == 'true'
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          version: 2026.3.9
          cache: true

      - name: SwiftFormat check
        run: mise exec -- swiftformat --lint .

      - name: SwiftLint check
        run: mise exec -- swiftlint lint --quiet

  unit-test:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.test == 'true'
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run unit tests
        run: |
          xcodebuild -project Keypunch.xcodeproj \
            -scheme Keypunch \
            -destination 'platform=macOS' \
            -only-testing:KeypunchTests \
            test

  ui-test:
    name: UI Tests (${{ matrix.shard.name }})
    needs: changes
    if: needs.changes.outputs.test == 'true'
    runs-on: macos-15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: Basics
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIBasicsTests
          - name: Edit Flow
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIEditFlowTests
          - name: Shortcut Management
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIShortcutManagementTests
          - name: Keyboard Navigation
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIKeyboardNavigationTests
          - name: Keyboard Edit Card
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIKeyboardEditCardTests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run UI tests
        run: |
          xcodebuild -project Keypunch.xcodeproj \
            -scheme Keypunch \
            -destination 'platform=macOS' \
            ${{ matrix.shard.only_testing }} \
            test
