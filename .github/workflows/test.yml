name: Test

on:
  workflow_call:
  push:
    paths:
      - 'Keypunch/**'
      - 'Keypunch.xcodeproj/**'
      - 'KeypunchTests/**'
      - 'KeypunchUITests/**'
      - 'Dependencies/**'
      - 'mise.toml'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'Keypunch/**'
      - 'Keypunch.xcodeproj/**'
      - 'KeypunchTests/**'
      - 'KeypunchUITests/**'
      - 'Dependencies/**'
      - 'mise.toml'
      - '.github/workflows/test.yml'

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          version: 2026.3.9
          cache: true

      - name: SwiftFormat check
        run: mise exec -- swiftformat --lint .

      - name: SwiftLint check
        run: mise exec -- swiftlint lint --quiet

  unit-test:
    name: Unit Tests
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run unit tests
        run: |
          xcodebuild -project Keypunch.xcodeproj \
            -scheme Keypunch \
            -destination 'platform=macOS' \
            -only-testing:KeypunchTests \
            test

  ui-test:
    name: UI Tests (${{ matrix.shard.name }})
    runs-on: macos-15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: Basics
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIBasicsTests
          - name: Edit Flow
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIEditFlowTests
          - name: Shortcut Management
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIShortcutManagementTests
          - name: Keyboard Navigation
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIKeyboardNavigationTests
          - name: Keyboard Edit Card
            only_testing: >-
              -only-testing:KeypunchUITests/KeypunchUIKeyboardEditCardTests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run UI tests
        run: |
          xcodebuild -project Keypunch.xcodeproj \
            -scheme Keypunch \
            -destination 'platform=macOS' \
            ${{ matrix.shard.only_testing }} \
            test
