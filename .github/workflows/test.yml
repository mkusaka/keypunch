name: Test

on:
  push:
    paths:
      - 'Keypunch/**'
      - 'Keypunch.xcodeproj/**'
      - 'KeypunchTests/**'
      - 'KeypunchUITests/**'
      - '.github/workflows/test.yml'

jobs:
  unit-test:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run unit tests
        run: |
          xcodebuild -project Keypunch.xcodeproj \
            -scheme Keypunch \
            -destination 'platform=macOS' \
            -only-testing:KeypunchTests \
            test

  ui-test:
    name: UI Tests
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run UI tests
        run: |
          xcodebuild -project Keypunch.xcodeproj \
            -scheme Keypunch \
            -destination 'platform=macOS' \
            -only-testing:KeypunchUITests \
            test
