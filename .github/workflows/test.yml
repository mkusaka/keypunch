name: Test

on:
  push:
    paths:
      - 'Keypunch/**'
      - 'Keypunch.xcodeproj/**'
      - 'KeypunchTests/**'
      - 'KeypunchUITests/**'
      - 'mise.toml'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'Keypunch/**'
      - 'Keypunch.xcodeproj/**'
      - 'KeypunchTests/**'
      - 'KeypunchUITests/**'
      - 'mise.toml'
      - '.github/workflows/test.yml'

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          version: 2026.3.9
          cache: true

      - name: SwiftFormat check
        run: mise exec -- swiftformat --lint .

      - name: SwiftLint check
        run: mise exec -- swiftlint lint --quiet

  unit-test:
    name: Unit Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run unit tests
        run: |
          xcodebuild -project Keypunch.xcodeproj \
            -scheme Keypunch \
            -destination 'platform=macOS' \
            -only-testing:KeypunchTests \
            test

  ui-test:
    name: UI Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run UI tests
        run: |
          xcodebuild -project Keypunch.xcodeproj \
            -scheme Keypunch \
            -destination 'platform=macOS' \
            -only-testing:KeypunchUITests \
            test
